  <text x="293.20399999999995" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)"><tspan x="293.20399999999995" dy="-3.9000000000000012">llama-dash</tspan><tspan x="293.20399999999995" dy="16.900000000000002">/mcp-relays/:slug</tspan></text>
</g>
