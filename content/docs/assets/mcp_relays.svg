  <text x="655.6234999999999" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Credential vault</text>
</g>
<g class="actor" data-id="MCP" data-label="Remote MCP server" data-type="participant">
